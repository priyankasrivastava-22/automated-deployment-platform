<h2>Deployments</h2>

<button onclick="deployDev()">Deploy to Dev</button>

<ul id="deployment-history"></ul>

<script>

async function deployDev(){

    await fetch("/deploy",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            environment:"dev",
            version:"1.0.1"
        })
    })

    loadDeployments()
}

async function loadDeployments(){

    const response = await fetch("/api/deployment-history")
    const data = await response.json()

    const list = document.getElementById("deployment-history")
    list.innerHTML=""

    data.forEach(d => {

        const li=document.createElement("li")

        li.innerText =
        `${d.environment} - v${d.version} - ${d.status}`

        list.appendChild(li)

    })
}

loadDeployments()
